# GitOps source-of-truth request. Commit this file to trigger install.
enabled: true
operation: install

# Cloudify connection is resolved from GitHub secrets/environment.
manager_url: ${CFY_MANAGER_URL}
username: ${CFY_USERNAME}
password: ${CFY_PASSWORD}
tenant: ${CFY_TENANT:-default_tenant}
api_version: ${CFY_API_VERSION:-v3.1}
insecure: ${CFY_INSECURE:-true}

# Keep explicit IDs for commit-based GitOps. Optional env override helps manual workflow runs.
blueprint_id: ${BLUEPRINT_ID:-hello-gitops-bp}
deployment_id: ${DEPLOYMENT_ID:-hello-gitops-dev}

blueprint_dir: blueprints/hello
application_file: blueprint.yaml
inputs_files:
  - inputs/dev.yaml

workflow: install
wait: true

# Idempotency policy
if_blueprint_exists: upload      # upload | skip | fail
if_deployment_exists: reuse      # reuse | skip | fail | recreate
allow_custom_parameters: true

# Timeouts/retries
request_timeout_sec: 60
execution_timeout_sec: 3600
poll_interval_sec: 10
retry_count: 5
retry_backoff_sec: 2

# Logging/audit
log_level: ${LOG_LEVEL:-INFO}
log_dir: logs
