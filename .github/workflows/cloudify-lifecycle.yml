name: Cloudify Lifecycle GitOps

on:
  workflow_dispatch:
    inputs:
      request_file:
        description: 'Request YAML to execute'
        required: true
        default: 'requests/hello-dev-install.yaml'
      deployment_id:
        description: 'Optional deployment id override for manual run'
        required: false
        default: ''
      blueprint_id:
        description: 'Optional blueprint id override for manual run'
        required: false
        default: ''
      dry_run:
        description: 'Validate only; do not call Cloudify'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  push:
    branches:
      - main
      - master
    paths:
      - 'requests/**/*.yaml'
      - 'requests/**/*.yml'
      - 'blueprints/**'
      - 'inputs/**'
      - 'scripts/cloudify_lifecycle.py'
      - '.github/workflows/cloudify-lifecycle.yml'

concurrency:
  # One Cloudify GitOps lifecycle at a time per branch. Prevents overlapping install/update/uninstall runs.
  group: cloudify-gitops-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cloudify-lifecycle:
    name: Execute Cloudify lifecycle
    runs-on: self-hosted
    timeout-minutes: 120

    env:
      CFY_MANAGER_URL: ${{ secrets.CFY_MANAGER_URL }}
      CFY_USERNAME: ${{ secrets.CFY_USERNAME }}
      CFY_PASSWORD: ${{ secrets.CFY_PASSWORD }}
      CFY_TENANT: ${{ secrets.CFY_TENANT }}
      CFY_API_VERSION: ${{ vars.CFY_API_VERSION || 'v3.1' }}
      CFY_INSECURE: ${{ vars.CFY_INSECURE || 'true' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      # Production-safe default: commit trigger runs only changed request YAMLs.
      # Set DEFAULT_REQUEST_FILE as a repo variable only if you intentionally want blueprint/input-only commits to trigger a request.
      DEFAULT_REQUEST_FILE: ${{ vars.DEFAULT_REQUEST_FILE || '' }}
      # all = execute all changed request files; first = only first; fail = fail if multiple request files changed.
      GITOPS_MULTI_REQUEST_MODE: ${{ vars.GITOPS_MULTI_REQUEST_MODE || 'all' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate local Python
        shell: bash
        run: |
          set -euo pipefail
          which python3
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CFY_MANAGER_URL:-}" || { echo "Missing GitHub secret: CFY_MANAGER_URL"; exit 1; }
          test -n "${CFY_USERNAME:-}" || { echo "Missing GitHub secret: CFY_USERNAME"; exit 1; }
          test -n "${CFY_PASSWORD:-}" || { echo "Missing GitHub secret: CFY_PASSWORD"; exit 1; }
          test -n "${CFY_TENANT:-}" || { echo "Missing GitHub secret: CFY_TENANT"; exit 1; }
          echo "Cloudify GitOps secrets configured. Tenant=${CFY_TENANT} Manager=${CFY_MANAGER_URL}"

      - name: Select request file(s)
        id: select_requests
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUEST_FILES="${{ github.event.inputs.request_file }}"
            echo "Manual workflow selected request: ${REQUEST_FILES}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_REQUESTS="$(git ls-files 'requests/*.yaml' 'requests/*.yml' 'requests/**/*.yaml' 'requests/**/*.yml' | sort -u || true)"
            else
              CHANGED_REQUESTS="$(git diff --name-only "${BEFORE}" "${AFTER}" -- 'requests/*.yaml' 'requests/*.yml' 'requests/**/*.yaml' 'requests/**/*.yml' | sort -u || true)"
            fi

            if [ -n "${CHANGED_REQUESTS}" ]; then
              COUNT="$(printf '%s\n' "${CHANGED_REQUESTS}" | sed '/^$/d' | wc -l | tr -d ' ')"
              case "${GITOPS_MULTI_REQUEST_MODE}" in
                all)
                  REQUEST_FILES="${CHANGED_REQUESTS}"
                  ;;
                first)
                  REQUEST_FILES="$(printf '%s\n' "${CHANGED_REQUESTS}" | head -1)"
                  ;;
                fail)
                  if [ "${COUNT}" -gt 1 ]; then
                    echo "Multiple request files changed and GITOPS_MULTI_REQUEST_MODE=fail:"
                    printf '%s\n' "${CHANGED_REQUESTS}"
                    exit 1
                  fi
                  REQUEST_FILES="${CHANGED_REQUESTS}"
                  ;;
                *)
                  echo "Unsupported GITOPS_MULTI_REQUEST_MODE=${GITOPS_MULTI_REQUEST_MODE}. Use all, first, or fail."
                  exit 1
                  ;;
              esac
            elif [ -n "${DEFAULT_REQUEST_FILE}" ]; then
              echo "No request YAML changed; using DEFAULT_REQUEST_FILE=${DEFAULT_REQUEST_FILE}"
              REQUEST_FILES="${DEFAULT_REQUEST_FILE}"
            else
              echo "No request YAML changed. Skipping Cloudify execution by design."
              REQUEST_FILES=""
            fi
          fi

          echo "Selected request file(s):"
          printf '%s\n' "${REQUEST_FILES}"

          {
            echo 'request_files<<EOF'
            printf '%s\n' "${REQUEST_FILES}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Execute Cloudify lifecycle
        if: steps.select_requests.outputs.request_files != ''
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r request_file; do
            [ -n "${request_file}" ] || continue
            case "${request_file}" in
              requests/*.yaml|requests/*.yml|requests/**/*.yaml|requests/**/*.yml) ;;
              *) echo "Refusing to run invalid request path: ${request_file}"; exit 1 ;;
            esac
            test -f "${request_file}" || { echo "Request file not found: ${request_file}"; exit 1; }

            ARGS=(--request "${request_file}")
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              if [ -n "${{ github.event.inputs.deployment_id }}" ]; then
                ARGS+=(--deployment-id "${{ github.event.inputs.deployment_id }}")
              fi
              if [ -n "${{ github.event.inputs.blueprint_id }}" ]; then
                ARGS+=(--blueprint-id "${{ github.event.inputs.blueprint_id }}")
              fi
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
                ARGS+=(--dry-run)
              fi
            fi

            echo "Executing Cloudify request: ${request_file}"
            python3 scripts/cloudify_lifecycle.py "${ARGS[@]}"
          done <<'EOF'
          ${{ steps.select_requests.outputs.request_files }}
          EOF

      - name: No-op summary
        if: steps.select_requests.outputs.request_files == ''
        run: echo "No Cloudify request YAML selected. Workflow completed without Cloudify changes."

      - name: Upload lifecycle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudify-gitops-lifecycle-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore
