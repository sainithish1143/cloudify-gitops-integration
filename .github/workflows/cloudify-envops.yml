name: Cloudify EnvOps GitOps

on:
  workflow_dispatch:
    inputs:
      deployment_file:
        description: "Deployment desired-state YAML"
        required: false
        default: "deployments/wr-demo-gitops-hello.yaml"
      action:
        description: "Manual action: create-environment, execute-workflow, delete-environment"
        required: false
        default: "create-environment"
      workflow:
        description: "Workflow for execute-workflow action"
        required: false
        default: "install"
      parameters_file:
        description: "Optional workflow parameters YAML"
        required: false
        default: ""
      inject_inputs_as_operation_kwargs:
        description: "true/false; inject deployment input YAML as operation_kwargs"
        required: false
        default: "false"
  push:
    paths:
      - "deployments/**"
      - "operations/**"
      - "blueprints/**"
      - "inputs/**"
      - "workflow-params/**"
      - "scripts/**"
      - ".github/workflows/cloudify-envops.yml"

concurrency:
  group: cloudify-envops-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-deploy:
    name: Test and Deploy via Conductor
    runs-on: self-hosted

    env:
      CFY_MANAGER_URL: ${{ secrets.CFY_MANAGER_URL }}
      CFY_USERNAME: ${{ secrets.CFY_USERNAME }}
      CFY_PASSWORD: ${{ secrets.CFY_PASSWORD }}
      CFY_TENANT: ${{ secrets.CFY_TENANT }}
      CFY_API_VERSION: ${{ vars.CFY_API_VERSION || 'v3.1' }}
      CFY_INSECURE: ${{ vars.CFY_INSECURE || 'true' }}
      GITOPS_MULTI_DEPLOYMENT_MODE: ${{ vars.GITOPS_MULTI_DEPLOYMENT_MODE || 'all' }}
      GITOPS_LOG_LEVEL: ${{ vars.GITOPS_LOG_LEVEL || 'INFO' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --break-system-packages 2>/dev/null || true
          python3 -m pip install -r requirements.txt --break-system-packages 2>/dev/null || python3 -m pip install -r requirements.txt
          python3 -m pip install ruff yamllint pip-audit pytest pytest-cov --break-system-packages 2>/dev/null || true

      - name: Code Quality
        continue-on-error: true
        run: |
          echo "=== Python Lint ==="
          python3 -m ruff check scripts/ --output-format=concise
          echo "=== YAML Validation ==="
          python3 -m yamllint -d "{extends: relaxed, rules: {line-length: disable, trailing-spaces: {level: warning}, empty-lines: {level: warning}}}" deployments/ operations/ inputs/ workflow-params/

      - name: Security Validation
        continue-on-error: true
        run: |
          echo "=== Dependency Audit ==="
          python3 -m pip_audit -r requirements.txt || true
          echo "=== Secrets Scan ==="
          if grep -rnE "password|secret|token|api_key|private_key" scripts/ deployments/ operations/ --include="*.py" --include="*.yaml" | grep -vE "password=|#|def |args|environ|getenv|credentials|CFY_PASSWORD|example|secret_name|_secret"; then
            echo "WARNING: Potential hardcoded secrets found"
          else
            echo "PASS: No hardcoded secrets detected"
          fi

      - name: Unit Tests
        continue-on-error: true
        run: |
          echo "=== Running Unit Tests with Coverage ==="
          python3 -m pytest tests/ -v --cov=scripts --cov-report=term-missing --cov-fail-under=20 || true

      - name: Infrastructure & Networking
        continue-on-error: true
        run: |
          echo "=== Network Connectivity ==="
          if curl -s --connect-timeout 5 -o /dev/null "$CFY_MANAGER_URL" --insecure; then
            echo "PASS: Conductor API reachable"
          else
            echo "FAIL: Cannot connect to Conductor"
            exit 1
          fi
          echo "=== API Authentication ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$CFY_USERNAME:$CFY_PASSWORD" -H "Tenant: $CFY_TENANT" "$CFY_MANAGER_URL/api/$CFY_API_VERSION/status" --insecure --connect-timeout 10)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS: API authentication successful"
          else
            echo "FAIL: API auth failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Observability & Logging
        continue-on-error: true
        run: |
          echo "=== Logging Verification ==="
          grep -qE "logging|logger" scripts/cloudify_lifecycle.py && echo "PASS: Logging framework used" || echo "FAIL"
          grep -qE "run_id|Run ID" scripts/cloudify_lifecycle.py && echo "PASS: Run ID traceability" || echo "FAIL"
          grep -qE "mask" scripts/cloudify_lifecycle.py && echo "PASS: Credential masking" || echo "FAIL"

      - name: Smoke Test
        run: |
          set -e
          echo "Testing Conductor API..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$CFY_USERNAME:$CFY_PASSWORD" -H "Tenant: $CFY_TENANT" "$CFY_MANAGER_URL/api/$CFY_API_VERSION/status" --insecure --connect-timeout 10)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS: Conductor API reachable (HTTP $HTTP_CODE)"
          else
            echo "FAIL: Conductor API returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Manual Cloudify action
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -e
          EXTRA=""
          if [ "${{ github.event.inputs.inject_inputs_as_operation_kwargs }}" = "true" ]; then
            EXTRA="$EXTRA --inject-inputs-as-operation-kwargs"
          fi
          if [ -n "${{ github.event.inputs.parameters_file }}" ]; then
            EXTRA="$EXTRA --parameters-file ${{ github.event.inputs.parameters_file }}"
          fi
          python3 scripts/manual_lifecycle_from_deployment.py \
            --deployment "${{ github.event.inputs.deployment_file }}" \
            --action "${{ github.event.inputs.action }}" \
            --workflow "${{ github.event.inputs.workflow }}" \
            $EXTRA

      - name: Commit-based Cloudify reconcile
        if: github.event_name == 'push'
        run: |
          set -e
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          echo "Reconciling Cloudify envops from $BEFORE to $AFTER"
          python3 scripts/gitops_reconcile.py \
            --before "$BEFORE" \
            --after "$AFTER" \
            --mode "$GITOPS_MULTI_DEPLOYMENT_MODE"

      - name: Upload lifecycle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudify-envops-logs
          path: logs/
          if-no-files-found: ignore
