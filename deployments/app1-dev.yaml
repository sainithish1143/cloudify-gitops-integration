apiVersion: cloudify.windriver.com/v1
kind: CloudifyDeployment

metadata:
  name: app1-dev
  environment: dev
  owner: platform-team
  description: Demo deployment managed through GitOps desired-state reconciliation.

spec:
  enabled: true

  manager:
    tenant: default_tenant

  blueprint:
    id: hello-gitops-bp
    source: blueprints/hello
    application_file: blueprint.yaml

  deployment:
    id: app1-dev
    inputs:
      - inputs/hello/dev.yaml

  lifecycle:
    install:
      workflow: install
      wait: true
      timeout_sec: 3600

    update:
      workflow: update
      wait: true
      timeout_sec: 3600

    uninstall:
      workflow: uninstall
      wait: true
      timeout_sec: 3600
      delete_deployment: true
      delete_blueprint: false

  execution:
    retry_count: 5
    retry_backoff_sec: 5
    request_timeout_sec: 60
    poll_interval_sec: 10

  logging:
    level: INFO
    log_dir: logs
